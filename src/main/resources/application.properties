spring.application.name=hodor

# Desactivar la generación automática de Hibernate
spring.jpa.hibernate.ddl-auto=none

# Habilitar Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Mapeo de variables de entorno (con valores por defecto vacíos para activar el fail-fast)
hodor.admin.username=${AUTH_ADMIN_USERX:}
hodor.admin.password=${AUTH_ADMIN_PASS:}