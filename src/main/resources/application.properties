spring.application.name=hodor

# application.properties
spring.config.import=optional:file:.env[.properties] 


# Desactivar la generación automática de Hibernate
spring.jpa.hibernate.ddl-auto=none

# Habilitar Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Mapeo de variables de entorno (con valores por defecto vacíos para activar el fail-fast)
hodor.admin.username=${AUTH_ADMIN_USER:}
hodor.admin.password=${AUTH_ADMIN_PASS:}
hodor.admin.client-id=${AUTH_ADMIN_CLIENT_ID:}
hodor.admin.client-secret=${AUTH_ADMIN_CLIENT_SECRET:}

# Configuración de proxy inverso (Caddy/Nginx)
# Esto indica a Spring Boot que debe procesar los envíos 'X-Forwarded-*'
# para inferir el "issuer" (URL base como https://hodor-java-auth.calevin.com) de manera automática.
server.forward-headers-strategy=framework

#logging.level.org.springframework.security=DEBUG
#logging.level.org.springframework.security.oauth2=DEBUG

# Forzar el uso de cookies y desactivar el jsessionid en la URL
server.servlet.session.tracking-modes=cookie

# Definimos la propiedad con un valor por defecto para desarrollo
hodor.auth.issuer-url=${AUTH_ISSUER_URL:http://localhost:8080}

spring.threads.virtual.enabled=true

# Spring Session JDBC (Autoconfigurado por la presencia del starter-jdbc)
spring.session.jdbc.initialize-schema=never
server.servlet.session.timeout=30m

# Error Configuration (Branding & Debug)
spring.web.error.include-stacktrace=always
spring.web.error.include-message=always
spring.web.error.include-exception=true