<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{consent.title}">Hodor - Autorización</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
</head>
<body class="solarized-theme">
    <div class="background-decor-1"></div>
    <div class="background-decor-2"></div>
    
    <header class="top-nav">
        <!-- Reutilizamos el botón de tema -->
        <div class="nav-controls">
            <button id="themeToggle" class="btn btn-icon" th:title="#{login.theme.dark}">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="login-container">
        <div class="login-card consent-card">
            <div class="card-header">
                <h1 th:text="#{consent.header}">Autorización Requerida</h1>
                <p class="app-request" th:utext="#{consent.app_request(${clientName})}">
                    La aplicación solicitante requiere permisos.
                </p>
            </div>

            <!-- Formulario de Consentimiento -->
            <form id="consentForm" th:action="@{/oauth2/authorize}" method="post" class="consent-form">
                <input type="hidden" name="client_id" th:value="${clientId}">
                <input type="hidden" name="state" th:value="${state}">

                <!-- Scopes por autorizar -->
                <div th:if="${not #sets.isEmpty(scopes)}" class="scope-group">
                    <h2 th:text="#{consent.scopes_to_authorize}">Permisos solicitados:</h2>
                    <ul class="scope-list">
                        <li th:each="scopeInfo : ${scopes}" class="scope-item">
                            <label class="checkbox-container">
                                <input type="checkbox" name="scope" th:value="${scopeInfo.scope}" th:id="'scope-' + ${scopeInfo.scope}" checked>
                                <span class="checkmark"></span>
                                <div class="scope-text">
                                    <strong th:text="${scopeInfo.scope}">openid</strong>
                                    <span th:text="${#messages.msgOrNull(scopeInfo.descriptionKey) ?: scopeInfo.scope}">Permiso</span>
                                </div>
                            </label>
                        </li>
                    </ul>
                </div>

                <!-- Scopes pre-autorizados -->
                <div th:if="${not #sets.isEmpty(previouslyAuthorizedScopes)}" class="scope-group muted">
                    <h2 th:text="#{consent.scopes_previously_authorized}">Permisos ya autorizados:</h2>
                    <ul class="scope-list">
                        <li th:each="scopeInfo : ${previouslyAuthorizedScopes}" class="scope-item">
                            <label class="checkbox-container disabled">
                                <input type="checkbox" name="scope" th:value="${scopeInfo.scope}" th:id="'previously-scope-' + ${scopeInfo.scope}" checked disabled>
                                <span class="checkmark"></span>
                                <div class="scope-text">
                                    <strong th:text="${scopeInfo.scope}">openid</strong>
                                    <span th:text="${#messages.msgOrNull(scopeInfo.descriptionKey) ?: scopeInfo.scope}">Permiso</span>
                                </div>
                            </label>
                            <!-- Los ocultos para que viajen en el post si el backend los espera -->
                            <input type="hidden" name="scope" th:value="${scopeInfo.scope}">
                        </li>
                    </ul>
                </div>

                <p class="consent-notice" th:text="#{consent.description}">Aviso legal...</p>

                <div class="form-footer consent-actions">
                    <button type="submit" class="btn btn-primary" th:text="#{consent.approve}">
                        Permitir
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="window.history.back()" th:text="#{consent.cancel}">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p th:text="'Authenticated as ' + ${principalName}">Usuario: calevin</p>
    </footer>

    <script th:src="@{/js/theme.js}"></script>
    <style>
        .consent-card { max-width: 500px; }
        .app-request { margin-top: 1rem; color: var(--text-secondary); line-height: 1.5; }
        .scope-group { margin-top: 2rem; text-align: left; }
        .scope-group h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 1rem; }
        .scope-list { list-style: none; }
        .scope-item { margin-bottom: 1rem; }
        
        .checkbox-container { display: flex; align-items: flex-start; cursor: pointer; position: relative; padding-left: 35px; user-select: none; }
        .checkbox-container input { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }
        .checkmark { position: absolute; top: 0; left: 0; height: 22px; width: 22px; background-color: var(--input-bg); border: 1px solid var(--input-border); border-radius: 6px; transition: all 0.2s; }
        .checkbox-container:hover input ~ .checkmark { border-color: var(--accent); }
        .checkbox-container input:checked ~ .checkmark { background-color: var(--accent); border-color: var(--accent); }
        .checkmark:after { content: ""; position: absolute; display: none; left: 7px; top: 3px; width: 5px; height: 10px; border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg); }
        .checkbox-container input:checked ~ .checkmark:after { display: block; }
        
        .scope-text { display: flex; flex-direction: column; margin-top: -2px; }
        .scope-text strong { font-size: 1rem; color: var(--text-primary); }
        .scope-text span { font-size: 0.85rem; color: var(--text-secondary); }
        
        .muted { opacity: 0.7; }
        .consent-notice { margin-top: 2rem; font-size: 0.75rem; color: var(--text-secondary); font-style: italic; }
        .consent-actions { display: flex; gap: 1rem; margin-top: 2rem; }
    </style>
</body>
</html>
